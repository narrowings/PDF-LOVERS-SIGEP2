version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sigep2_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigep_user
      POSTGRES_PASSWORD: sigep_pass
      POSTGRES_DB: sigep2_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sigep_user -d sigep2_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigep2_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sigep_user:sigep_pass@postgres:5432/sigep2_db
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      ALLOWED_ORIGINS: http://localhost:5173

      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}

      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    ports:
      - '3001:3001'


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sigep2_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  pgdata:
